# =============================================================================
# DATASET CONFIG: Titanic Dataset
# =============================================================================

DATA_PATH: "datasets/titanic_dataset.csv"
TARGET_COLUMN: "Survived"
TARGET_ENCODING: null

# Optional row filter — set both to null to skip
FILTER_COLUMN: null
FILTER_VALUE: null

# Columns to drop before modelling (IDs, leaky columns, high missingness)
DROP_COLUMNS:
  - "PassengerId"
  - "Name"
  - "Ticket"
  - "Cabin"

# Columns to exclude specific values from
EXCLUDE_CATEGORY_VALUES: null

# Pclass is ordinal: 1st class > 2nd class > 3rd class
# Reversed so higher number = higher class (better survival odds direction)
ORDINAL_MAPPINGS:
  Pclass:
    1: 3
    2: 2
    3: 1

# Interaction terms
INTERACTION_TERMS:
  - ["SibSp", "Parch"]   # Together these represent family size
  - ["Pclass", "Age"]    # Class-adjusted age effect on survival

# Feature groups
NUMERIC_FEATURES:
  - "Pclass"
  - "Age"
  - "SibSp"
  - "Parch"
  - "Fare"

CATEGORICAL_FEATURES:
  - "Sex"
  - "Embarked"

TEST_SET_FRACTION: 0.2

# Default threshold (0.5) for all models including sparse LR
THRESHOLD_STRATEGY: null
THRESHOLD_TARGET: null

# Lowered from 10 because Titanic only has 2 truly continuous features (Age, Fare)
GAM_SMOOTH_COUNT: 2

PCA_SAMPLE: null

# The Titanic dataset is tiny (891 rows), so we can use the whole thing for SVM
SVM_SAMPLE: 1.0

SEED: 42